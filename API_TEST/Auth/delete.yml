info:
  name: Delete Account
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{base_url}}/api/auth/delete"
  auth:
    type: bearer
    token: "{{Bearer}}"
  headers:
    - name: Accept
      value: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Permanently delete authenticated user account, revoke all tokens, and remove stored profile image.
