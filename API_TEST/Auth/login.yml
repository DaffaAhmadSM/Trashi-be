info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: demo@trashi.test
      - name: password
        type: text
        value: password
      - name: email
        type: text
        value: admin@test.com
        disabled: true
      - name: password
        type: text
        value: inipasswordadmin
        disabled: true

runtime:
  scripts:
    - type: after-response
      code: |-
        body=res.getBody()
        bru.setEnvVar("Bearer", body.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Login with email and password. Returns user data and an API token.
