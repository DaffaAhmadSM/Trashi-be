info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: admin@test.com
      - name: password
        type: text
        value: admin321

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Login with email and password. Returns user data and an API token.
