info:
  name: Get Current User
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/auth/user"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get authenticated user profile. Requires authentication.
