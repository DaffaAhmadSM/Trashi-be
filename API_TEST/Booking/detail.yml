info:
  name: Transaction Detail
  type: http
  seq: 13

http:
  method: GET
  url: "{{base_url}}/api/transactions/{{trans_id}}"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{Bearer}}"

runtime:
  variables:
    - name: trans_id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get single transaction detail with waste categories, payment fees, and address.
