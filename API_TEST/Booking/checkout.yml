info:
  name: Checkout (Pay)
  type: http
  seq: 11

http:
  method: POST
  url: "{{base_url}}/api/checkout/{{trans_id}}"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{Bearer}}"

runtime:
  variables:
    - name: trans_id
      value: "2"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Process payment for a booking. Currently sets payment_status to "paid" (placeholder for Midtrans integration).
