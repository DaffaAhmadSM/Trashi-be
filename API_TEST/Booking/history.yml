info:
  name: Transaction History
  type: http
  seq: 12

http:
  method: GET
  url: "{{base_url}}/api/transactions"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get authenticated user transaction history with details, fees, and address.
