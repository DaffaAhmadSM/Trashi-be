info:
  name: Show Address
  type: http
  seq: 7

http:
  method: GET
  url: "{{base_url}}/api/addresses/{{address_id}}"
  auth: bearer
  bearer:
    token: "{{token}}"
  headers:
    - name: Accept
      value: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get a single address by ID. Requires authentication.
