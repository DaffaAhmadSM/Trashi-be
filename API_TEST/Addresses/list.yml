info:
  name: List Addresses
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/addresses"
  auth: bearer
  bearer:
    token: "{{token}}"
  headers:
    - name: Accept
      value: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all addresses belonging to the authenticated user. Requires authentication.
