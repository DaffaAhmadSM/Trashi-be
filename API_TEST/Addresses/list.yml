info:
  name: List Addresses
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/addresses"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all addresses belonging to the authenticated user. Requires authentication.
