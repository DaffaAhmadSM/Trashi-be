info:
  name: Update Address
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/addresses/{{address_id}}"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: latitude
        type: text
        value: "-6.2088"
      - name: longitude
        type: text
        value: "106.8456"
  auth:
    type: bearer
    token: "{{Bearer}}"

runtime:
  variables:
    - name: address_id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update an existing address. Requires authentication.
