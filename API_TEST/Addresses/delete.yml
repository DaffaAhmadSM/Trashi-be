info:
  name: Delete Address
  type: http
  seq: 9

http:
  method: DELETE
  url: "{{base_url}}/api/addresses/{{address_id}}"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{Bearer}}"

runtime:
  variables:
    - name: address_id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Delete an address by ID. Requires authentication.
