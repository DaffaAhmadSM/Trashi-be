info:
  name: Create Address
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/addresses"
  auth: bearer
  bearer:
    token: "{{token}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: label
        type: text
        value: ""
      - name: city
        type: text
        value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

vars:
  res:
    address_id: res.body.address_id

docs: Create a new address for the authenticated user. Returns the created address.
