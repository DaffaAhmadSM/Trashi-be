info:
  name: Create Address
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/addresses"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: label
        type: text
        value: Rumah
      - name: city
        type: text
        value: citi
      - name: latitude
        type: text
        value: "-6.2088"
      - name: longitude
        type: text
        value: "106.8456"
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new address for the authenticated user. Returns the created address.
