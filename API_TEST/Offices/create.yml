info:
  name: Create Office
  type: http
  seq: 17

http:
  method: POST
  url: "{{base_url}}/api/offices"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: office_name
        type: text
        value: abcd
      - name: office_address
        type: text
        value: aaaa
      - name: office_phone
        type: text
        value: aaaaa
      - name: address_latitude
        type: text
        value: "-6.2088"
      - name: address_longitude
        type: text
        value: "106.8456"
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new office. Admin only.
